include: package:flutter_lints/flutter.yaml

analyzer:
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false
  
  errors:
    missing_required_param: error
    missing_return: error
    todo: warning
    deprecated_member_use: warning
    invalid_annotation_target: ignore
    avoid_classes_with_only_static_members: ignore
    avoid_equals_and_hash_code_on_mutable_classes: ignore
    avoid_positional_boolean_parameters: ignore
    avoid_slow_async_io: ignore
    avoid_unnecessary_containers: ignore
    camel_case_types: ignore
    cascade_invocations: ignore
    constant_identifier_names: ignore
    do_not_use_environment: ignore
    join_return_with_assignment: ignore
    leading_newlines_in_multiline_strings: ignore
    library_prefixes: ignore
    lines_longer_than_80_chars: ignore
    missing_whitespace_between_adjacent_strings: ignore
    no_default_cases: ignore
    prefer_constructors_over_static_methods: ignore
    prefer_expression_function_bodies: ignore
    prefer_foreach: ignore
    prefer_int_literals: ignore
    prefer_null_aware_method_calls: ignore
    sort_pub_dependencies: ignore
    use_late_for_private_fields_and_variables: ignore
    use_named_constants: ignore
    use_setters_to_change_properties: ignore
    use_string_buffers: ignore
  
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated/**"
    - "build/**"

# Dart Code Metrics 配置
# 注意：dart_code_metrics 与项目的 uuid 版本冲突，暂时禁用
# 可以使用 flutter analyze 和内置的 linter 规则代替

# 如果要使用代码度量，可以考虑：
# 1. 使用在线工具（如 SonarQube）
# 2. 等待 dart_code_metrics 更新支持 uuid ^4.0
# 3. 使用 VS Code 扩展：Dart Code Metrics

# dart_code_metrics:
#   metrics:
#     cyclomatic-complexity: 20
#     number-of-parameters: 4
#     maximum-nesting-level: 5

linter:
  rules:
    # 代码风格
    - always_declare_return_types
    - always_put_control_body_on_new_line
    - always_put_required_named_parameters_first
    # - always_require_non_null_named_parameters  # Removed in Dart 3.3.0
    - always_use_package_imports
    - annotate_overrides
    - avoid_annotating_with_dynamic
    - avoid_bool_literals_in_conditional_expressions
    - avoid_catches_without_on_clauses
    - avoid_catching_errors
    # Disabled: Flutter projects commonly use static-only utility/config classes.
    # Enforcing this creates churn without improving runtime safety.
    # - avoid_classes_with_only_static_members
    - avoid_double_and_int_checks
    - avoid_dynamic_calls
    - avoid_empty_else
    # Disabled for model classes that already use value equality intentionally.
    # - avoid_equals_and_hash_code_on_mutable_classes
    - avoid_escaping_inner_quotes
    - avoid_field_initializers_in_const_classes
    - avoid_function_literals_in_foreach_calls
    - avoid_implementing_value_types
    - avoid_init_to_null
    - avoid_js_rounded_ints
    - avoid_multiple_declarations_per_line
    - avoid_null_checks_in_equality_operators
    # Disabled: this codebase has established public APIs with boolean flags.
    # - avoid_positional_boolean_parameters
    - avoid_print
    - avoid_private_typedef_functions
    - avoid_redundant_argument_values
    - avoid_relative_lib_imports
    - avoid_renaming_method_parameters
    - avoid_return_types_on_setters
    - avoid_returning_null_for_void
    - avoid_setters_without_getters
    - avoid_shadowing_type_parameters
    - avoid_single_cascade_in_expression_statements
    # Disabled: async file IO is preferable on Flutter UI flows; forcing sync IO
    # can make the app less responsive.
    # - avoid_slow_async_io
    - avoid_type_to_string
    - avoid_types_as_parameter_names
    - avoid_unnecessary_containers
    - avoid_unused_constructor_parameters
    - avoid_void_async
    - avoid_web_libraries_in_flutter
    - await_only_futures
    - camel_case_extensions
    # Disabled for platform-style names such as iOSUpdateService.
    # - camel_case_types
    - cancel_subscriptions
    # Disabled: cascade-only rewrites are mostly style churn.
    # - cascade_invocations
    - cast_nullable_to_non_nullable
    - close_sinks
    - comment_references
    - conditional_uri_does_not_exist
    # Disabled: existing persisted/config constants intentionally mirror legacy
    # uppercase keys.
    # - constant_identifier_names
    - control_flow_in_finally
    - curly_braces_in_flow_control_structures
    - depend_on_referenced_packages
    - deprecated_consistency
    - directives_ordering
    # Disabled: compile-time environment values are the intended configuration
    # mechanism for this app.
    # - do_not_use_environment
    - empty_catches
    - empty_constructor_bodies
    - empty_statements
    - eol_at_end_of_file
    - exhaustive_cases
    - file_names
    - flutter_style_todos
    - hash_and_equals
    - implementation_imports
    - join_return_with_assignment
    - leading_newlines_in_multiline_strings
    - library_annotations
    - library_names
    # Disabled for existing alias names such as Config.
    # - library_prefixes
    - library_private_types_in_public_api
    # Disabled: Dart formatter uses 80 as a guide, but enforcing it across UI
    # strings/localization causes low-value churn.
    # - lines_longer_than_80_chars
    - missing_whitespace_between_adjacent_strings
    - no_adjacent_strings_in_list
    # Disabled: default cases are useful for defensive handling of remote enums.
    # - no_default_cases
    - no_duplicate_case_values
    - no_leading_underscores_for_library_prefixes
    - no_leading_underscores_for_local_identifiers
    - no_logic_in_create_state
    - no_runtimeType_toString
    - non_constant_identifier_names
    - noop_primitive_operations
    - null_check_on_nullable_type_parameter
    - null_closures
    - omit_local_variable_types
    - one_member_abstracts
    - only_throw_errors
    - overridden_fields
    - package_names
    - package_prefixed_library_names
    - parameter_assignments
    - prefer_adjacent_string_concatenation
    - prefer_asserts_in_initializer_lists
    - prefer_asserts_with_message
    - prefer_collection_literals
    - prefer_conditional_assignment
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    # Disabled: named static factories/helpers are clearer for utility APIs here.
    # - prefer_constructors_over_static_methods
    - prefer_contains
    # - prefer_equal_for_default_values  # Removed in Dart 3.0.0
    # Disabled: block bodies are often more readable in UI-heavy code.
    # - prefer_expression_function_bodies
    - prefer_final_fields
    - prefer_final_in_for_each
    - prefer_final_locals
    - prefer_for_elements_to_map_fromIterable
    # Disabled: for-in is easier to debug and avoids callback capture surprises.
    # - prefer_foreach
    - prefer_function_declarations_over_variables
    - prefer_generic_function_type_aliases
    - prefer_if_elements_to_conditional_expressions
    - prefer_if_null_operators
    - prefer_initializing_formals
    - prefer_inlined_adds
    # Disabled: explicit double literals are sometimes needed to avoid unwanted
    # int inference in numeric APIs.
    # - prefer_int_literals
    - prefer_interpolation_to_compose_strings
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_is_not_operator
    - prefer_iterable_whereType
    - prefer_mixin
    - prefer_null_aware_method_calls
    - prefer_null_aware_operators
    # - prefer_relative_imports  # Conflicts with always_use_package_imports
    - prefer_single_quotes
    - prefer_spread_collections
    - prefer_typing_uninitialized_variables
    - prefer_void_to_null
    - provide_deprecation_message
    - recursive_getters
    - require_trailing_commas
    - secure_pubspec_urls
    - sized_box_for_whitespace
    - sized_box_shrink_expand
    - slash_for_doc_comments
    - sort_child_properties_last
    - sort_constructors_first
    - sort_pub_dependencies
    - sort_unnamed_constructors_first
    - test_types_in_equals
    - throw_in_finally
    - tighten_type_of_initializing_formals
    - type_annotate_public_apis
    - type_init_formals
    - unawaited_futures
    - unnecessary_await_in_return
    - unnecessary_brace_in_string_interps
    - unnecessary_const
    - unnecessary_constructor_name
    - unnecessary_getters_setters
    - unnecessary_lambdas
    - unnecessary_late
    - unnecessary_library_directive
    - unnecessary_new
    - unnecessary_null_aware_assignments
    - unnecessary_null_checks
    - unnecessary_null_in_if_null_operators
    - unnecessary_nullable_for_final_variable_declarations
    - unnecessary_overrides
    - unnecessary_parenthesis
    - unnecessary_raw_strings
    - unnecessary_statements
    - unnecessary_string_escapes
    - unnecessary_string_interpolations
    - unnecessary_this
    - unnecessary_to_list_in_spreads
    - unrelated_type_equality_checks
    # - unsafe_html  # Removed in Dart 3.7.0
    - use_build_context_synchronously
    - use_colored_box
    - use_decorated_box
    - use_enums
    - use_full_hex_values_for_flutter_colors
    - use_function_type_syntax_for_parameters
    - use_if_null_to_convert_nulls_to_bools
    - use_is_even_rather_than_modulo
    - use_key_in_widget_constructors
    - use_late_for_private_fields_and_variables
    - use_named_constants
    - use_raw_strings
    - use_rethrow_when_possible
    # Disabled: method names make side effects clearer for service configuration.
    # - use_setters_to_change_properties
    # Disabled: only useful for larger loops; tiny concatenations are fine.
    # - use_string_buffers
    - use_string_in_part_of_directives
    - use_super_parameters
    - use_test_throws_matchers
    - use_to_and_as_if_applicable
    - valid_regexps
    - void_checks
