name: Flutter CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  analyze-and-test:
    name: 代码分析与测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: 验证 Flutter 安装
        run: flutter --version

      - name: 获取依赖
        run: flutter pub get

      - name: 代码静态分析
        run: flutter analyze
        continue-on-error: true

      - name: 运行测试并生成覆盖率报告
        run: flutter test --coverage
        continue-on-error: true

      - name: 上传覆盖率报告到 Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: IntRoot-coverage
        continue-on-error: true

      - name: 生成覆盖率 HTML 报告
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info -o coverage/html
        continue-on-error: true

      - name: 上传覆盖率 HTML 报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html
        continue-on-error: true

      - name: 检查格式
        run: dart format --set-exit-if-changed .
        continue-on-error: true

  build-apk:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 清除 Flutter 缓存
        run: flutter pub cache clean --force

      - name: 获取依赖
        run: flutter pub get

      - name: 构建 APK
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: 构建 iOS IPA
    runs-on: macos-latest
    needs: analyze-and-test
    if: github.event_name == 'push'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: 获取依赖
        run: flutter pub get

      - name: 构建 iOS (无签名)
        run: flutter build ios --release --no-codesign
        continue-on-error: true
