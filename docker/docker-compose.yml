version: '3.8'

services:
  # Memos v0.21.0（基线版本）
  memos-v021:
    image: neosmemo/memos:0.21.0
    container_name: memos-v021
    ports:
      - "5230:5230"
    environment:
      - MEMOS_MODE=prod
      - MEMOS_PORT=5230
    volumes:
      - memos-v021-data:/var/opt/memos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5230/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Memos v0.22.5（API v1 不兼容更新后的稳定版）
  memos-v022:
    image: neosmemo/memos:0.22.5
    container_name: memos-v022
    ports:
      - "5231:5230"
    environment:
      - MEMOS_MODE=prod
      - MEMOS_PORT=5230
    volumes:
      - memos-v022-data:/var/opt/memos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5230/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Memos v0.23.1（标签重构版本）
  memos-v023:
    image: neosmemo/memos:0.23.1
    container_name: memos-v023
    ports:
      - "5232:5230"
