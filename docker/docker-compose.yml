    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5230/api/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Memos v0.25.3（数据库&API变更后的稳定版）
  memos-v025:
    image: neosmemo/memos:0.25.3
    container_name: memos-v025
